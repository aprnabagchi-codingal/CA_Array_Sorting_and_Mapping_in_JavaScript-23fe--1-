<!DOCTYPE html>
<html>
<head>
  <title>My Playlist Sorter</title>
  <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css">
  <style>
    body { background: lavender; }
    h1, h3 { color: darkviolet; }
    .box { background: white; color: darkviolet; }
  </style>
</head>
<body>
<div class="container py-4">

  <h1 class="mb-1">My Playlist Sorter</h1>
  <p class="text-muted mb-4">Sort and label your music playlist using JavaScript array methods!</p>

  <!-- TOPIC 1 & 2: sort() and reverse() -->
  <div class="card mb-4">
    <div class="card-body">
      <h3 class="card-title">Song Names</h3>
      <button class="btn btn-primary mr-2" onclick="sortAZ()">Sort A to Z</button>
      <button class="btn btn-primary" onclick="sortZA()">Sort Z to A</button>
      <div id="nameResult" class="box p-3 mt-3 rounded"></div>
    </div>
  </div>

  <!-- TOPIC 3: sort() with compare function -->
  <div class="card mb-4">
    <div class="card-body">
      <h3 class="card-title">Play Counts</h3>
      <button class="btn btn-primary mr-2" onclick="sortLeast()">Least Played First</button>
      <button class="btn btn-primary" onclick="sortMost()">Most Played First</button>
      <div id="countResult" class="box p-3 mt-3 rounded"></div>
    </div>
  </div>

  <!-- TOPIC 4: map() -->
  <div class="card mb-4">
    <div class="card-body">
      <h3 class="card-title">Label Every Play Count</h3>
      <button class="btn btn-primary" onclick="addLabel()">Add Plays Label</button>
      <div id="labelResult" class="box p-3 mt-3 rounded"></div>
    </div>
  </div>

</div>
<script>
 
</script>
</body>
</html>
